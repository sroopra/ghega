name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: make test

      - name: Run linter
        run: make lint

      - name: Build binary
        run: make build

      - name: Runtime boundary verification
        run: make test-runtime-no-java-js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: make ui-build

      - name: Validate skills
        run: make validate-skills
